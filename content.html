<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#141414" />

    <title>MauriTV</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>



    <div id="virtual-cursor" style="display:none;"></div>

    <!-- Módulos API -->
    <script>
        // Versión única de scripts para cache busting. Puede ser un string fijo o autogenerado.
        // const SCRIPT_VERSION = Math.random().toString(36).substring(2, 9);
        const SCRIPT_VERSION = 1;
        console.log('Script version: ' + SCRIPT_VERSION);

        document.write(`<script src="assets/js/config.js?v=${SCRIPT_VERSION}"><\/script>`);
        document.write(`<script src="assets/js/tmdb.js?v=${SCRIPT_VERSION}"><\/script>`);
        document.write(`<script src="assets/js/vaplayer.js?v=${SCRIPT_VERSION}"><\/script>`);
        document.write(`<script src="assets/js/opensubtitles.js?v=${SCRIPT_VERSION}"><\/script>`);
        document.write(`<script src="assets/js/verify.js?v=${SCRIPT_VERSION}"><\/script>`);
    </script>

    <script>
        /* ========== CONFIGURATION (lee de CONFIG y localStorage) ========== */
        const _cfg = window.CONFIG || {};
        const HISTORY_KEY = _cfg.HISTORY_KEY || 'movie_history_v1';
        const HIDDEN_RESOLUTIONS = _cfg.HIDDEN_RESOLUTIONS || ['CAM', 'TS', 'TC'];
        const VERIFY_DISPONIBILIDAD = localStorage.getItem('verify_disponibilidad') === 'true';
        const BLOCK_LOW_RES = localStorage.getItem('block_low_res') !== 'false';

        /* ========== STATE ========== */
        let ytPlayer = null;
        let currentTrailerKey = null;
        let ytApiReady = false;


        /* ========== YOUTUBE API ========== */
        window.onYouTubeIframeAPIReady = function () {
            console.log('YouTube API ready');
            ytApiReady = true;
            if (currentTrailerKey) {
                iniciarReproductorYouTube(currentTrailerKey);
            }
        };

        /* ========== HISTORY MANAGEMENT ========== */
        function saveToHistory(movie) {
            // Si auth-drive.js está cargado y el usuario logueado, usar historial unificado (localStorage + Drive)
            if (typeof guardarReciente === 'function') {
                guardarReciente(movie);
                return;
            }
            // Fallback: solo localStorage
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const existingIndex = history.findIndex(item =>
                String(item.id) === String(movie.id) ||
                (item.tmdbId && String(item.tmdbId) === String(movie.tmdbId))
            );

            if (existingIndex !== -1) {
                movie = { ...history[existingIndex], ...movie };
                history.splice(existingIndex, 1);
            } else {
                history = history.filter(item => String(item.id) !== String(movie.id));
            }

            history.unshift(movie);
            history = history.slice(0, 10);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function mostrarErrorTrailer(titulo = '', trailerKey = null) {
            const container = document.getElementById('trailerContainer');
            const searchQuery = titulo ? `${titulo} trailer oficial` : 'trailer';
            const youtubeSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}&gl=AR&hl=es-419`;
            const directUrl = trailerKey ? `https://www.youtube.com/watch?v=${trailerKey}&gl=AR&hl=es-419` : youtubeSearchUrl;

            container.innerHTML = `
                <div class="trailer-error">
                    <span class="material-icons">error_outline</span>
                    <p style="margin-bottom: 8px;">No se pudo cargar el trailer</p>
                    <p style="font-size: 0.9rem;">El video puede no estar disponible en tu región</p>
                    <a href="${directUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="material-icons" style="font-size: 18px;">open_in_new</span>
                        Ver en YouTube
                    </a>
                </div>
            `;
        }

        function iniciarReproductorYouTube(trailerKey) {
            const container = document.getElementById('trailerContainer');
            currentTrailerKey = trailerKey;

            if (!ytApiReady) {
                container.innerHTML = `
                    <div class="trailer-placeholder">
                        <span class="material-icons">play_circle_filled</span>
                        <p>Cargando reproductor...</p>
                    </div>
                `;
                return;
            }

            try {
                container.innerHTML = '';
                const playerDiv = document.createElement('div');
                playerDiv.id = 'youtube-player';
                container.appendChild(playerDiv);

                if (ytPlayer) ytPlayer.destroy();

                ytPlayer = new YT.Player('youtube-player', {
                    videoId: trailerKey,
                    playerVars: {
                        autoplay: 0,
                        rel: 0,
                        modestbranding: 1,
                        controls: 1,
                        showinfo: 0,
                        iv_load_policy: 3,
                        fs: 1,
                        playsinline: 1,
                        origin: window.location.origin,
                        widget_referrer: window.location.href,
                        hl: 'es-419',
                        gl: 'AR'
                    },
                    events: {
                        onReady: onPlayerReady,
                        onError: onPlayerError
                    }
                });

                container.onclick = () => {
                    if (ytPlayer && ytPlayer.getPlayerState) {
                        const state = ytPlayer.getPlayerState();
                        if (state === YT.PlayerState.PLAYING) {
                            ytPlayer.pauseVideo();
                        } else {
                            ytPlayer.playVideo();
                        }
                    }
                };
            } catch (error) {
                console.error('Error creating YouTube player:', error);
                mostrarErrorTrailer(document.getElementById('title').textContent, trailerKey);
            }
        }

        function onPlayerReady(event) {
            console.log('YouTube player ready');
        }

        function onPlayerError(event) {
            console.error('YouTube player error:', event.data);
            let errorMessage = '';
            switch (event.data) {
                case 2: errorMessage = 'Video inválido'; break;
                case 5: errorMessage = 'Error de reproducción'; break;
                case 100: errorMessage = 'Video no encontrado'; break;
                case 101: case 150: errorMessage = 'Video no disponible en esta plataforma'; break;
                default: errorMessage = 'Error desconocido';
            }
            const titulo = document.getElementById('title').textContent;
            const youtubeUrl = `https://www.youtube.com/watch?v=${currentTrailerKey}&gl=AR&hl=es-419`;
            const container = document.getElementById('trailerContainer');
            container.innerHTML = `
                <div class="trailer-error">
                    <span class="material-icons">error_outline</span>
                    <p style="margin-bottom: 8px;">Error al reproducir el trailer</p>
                    <p style="font-size: 0.9rem;">${errorMessage}</p>
                    <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="material-icons" style="font-size: 18px;">open_in_new</span>
                        Ver en YouTube
                    </a>
                </div>
            `;
        }

        // buscarTrailer removida, ahora provista por window.tmdb.getTrailerKey

        async function fetchSubtitles(imdbId, type, season, episode, videoFileName) {
            const subSelect = document.getElementById('sub-select');
            if (!imdbId) {
                subSelect.style.display = 'none';
                return;
            }
            subSelect.innerHTML = '<option value="">Buscando subtítulos...</option>';
            subSelect.style.display = 'inline-block';
            try {
                const subLang = 'es,ea';
                const { items, bestIndex, recommended } = await window.openSubtitles.searchAndMatch(
                    imdbId, type, season, episode, videoFileName, subLang
                );

                if (items.length > 0) {
                    let options = '<option value="">Seleccionar subtítulos externos</option>';
                    items.forEach((s, idx) => {
                        const star = (recommended && idx === bestIndex) ? '⭐ ' : '';
                        options += `<option value="${s.fileId}">${star}${s.release}</option>`;
                    });
                    subSelect.innerHTML = options;
                    subSelect.selectedIndex = bestIndex + 1;

                    if (recommended) {
                        console.log(`[SmartMatch] Recomendado: "${items[bestIndex].release}"`);
                    }
                } else {
                    subSelect.innerHTML = '<option value="">Seleccionar subtítulos externos</option>';
                    if (type === 'movie') subSelect.style.display = 'none';
                }
            } catch (e) {
                console.error("Error loading subtitles", e);
                subSelect.innerHTML = '<option value="">Error in subtitles</option>';
            }
        }

        async function loadContent() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || '278';
            const type = params.get('type') || 'movie';
            const file_name = params.get('file_name') || params.get('filename') || '';
            const res = params.get('res') || '';
            const src = params.get('src') || '';

            try {
                const data = await window.tmdb.getDetails(id, type, 'recommendations,external_ids,credits', 'es-MX');

                const title = data.title || data.name || 'Sin título';
                document.title = `${title} - MauriTV`;
                document.getElementById('title').textContent = title;
                const overviewEl = document.getElementById('overview');
                overviewEl.textContent = data.overview || 'Sinopsis no disponible.';

                requestAnimationFrame(() => {
                    const verMasBtn = document.getElementById('ver-mas-btn');
                    if (overviewEl.scrollHeight > overviewEl.clientHeight) {
                        verMasBtn.style.display = 'inline-block';
                        const newBtn = verMasBtn.cloneNode(true);
                        verMasBtn.parentNode.replaceChild(newBtn, verMasBtn);
                        newBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            const isExpanded = overviewEl.classList.toggle('expanded');
                            newBtn.textContent = isExpanded ? 'Ver menos' : 'Ver más';
                        });
                    } else {
                        verMasBtn.style.display = 'none';
                    }
                });

                const profileBase = 'https://image.tmdb.org/t/p/w185';
                const placeholderProfile = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='50' fill='%232a2a2a'/%3E%3Ccircle cx='50' cy='38' r='18' fill='%23555'/%3E%3Cellipse cx='50' cy='82' rx='28' ry='20' fill='%23555'/%3E%3C/svg%3E";
                let directorSection = `<p style="margin-top:8px;"><strong>Director:</strong></p>`;
                if (data.credits?.crew) {
                    const dirObj = data.credits.crew.find(c => c.job === 'Director');
                    if (dirObj) {
                        const img = dirObj.profile_path ? `${profileBase}${dirObj.profile_path}` : placeholderProfile;
                        directorSection += `
                            <div class="person-list">
                                <div class="person-item">
                                    <a href="index.html?person_id=${dirObj.id}&person_name=${encodeURIComponent(dirObj.name)}" class="person-link navigable person-photo-link" tabindex="0" aria-label="${dirObj.name}">
                                        <img src="${img}" alt="${dirObj.name}" class="person-photo" loading="lazy" onerror="this.onerror=null;this.src=placeholderProfile;">
                                    </a>
                                    <div class="person-name">${dirObj.name}</div>
                                </div>
                            </div>`;
                    } else if (data.created_by?.length > 0) {
                        directorSection += '<div class="person-list">';
                        directorSection += data.created_by.map(c => {
                            const img = c.profile_path ? `${profileBase}${c.profile_path}` : placeholderProfile;
                            return `
                                <div class="person-item">
                                    <a href="index.html?person_id=${c.id}&person_name=${encodeURIComponent(c.name)}" class="person-link navigable person-photo-link" tabindex="0" aria-label="${c.name}">
                                        <img src="${img}" alt="${c.name}" class="person-photo" loading="lazy" onerror="this.onerror=null;this.src=placeholderProfile;">
                                    </a>
                                    <div class="person-name">${c.name}</div>
                                </div>`;
                        }).join('');
                        directorSection += '</div>';
                    }
                } else {
                    directorSection += '<div>N/A</div>';
                }

                let castSection = `<p style="margin-bottom: 6px;"><strong>Elenco:</strong></p><div class="person-list">`;
                if (data.credits?.cast?.length > 0) {
                    const castArr = data.credits.cast.slice(0, 6);
                    castArr.forEach(c => {
                        const img = c.profile_path ? `${profileBase}${c.profile_path}` : placeholderProfile;
                        castSection += `
                            <div class="person-item">
                                <a href="index.html?person_id=${c.id}&person_name=${encodeURIComponent(c.name)}" class="person-link navigable person-photo-link" tabindex="0" aria-label="${c.name}">
                                    <img src="${img}" alt="${c.name}" class="person-photo" loading="lazy" onerror="this.onerror=null;this.src=placeholderProfile;">
                                </a>
                                <div class="person-name">${c.name}</div>
                                ${c.character ? `<div class="person-character">${c.character}</div>` : ''}
                            </div>`;
                    });
                } else {
                    castSection += '<div>N/A</div>';
                }
                castSection += '</div>';
                document.getElementById('castDirector').innerHTML = castSection + directorSection;

                // El filename-display se actualizará después de mainValidation
                // para asegurarse de usar el file_name correcto del IMDB ID real
                const filenameDisplay = document.getElementById('filename-display');
                filenameDisplay.style.display = 'none';

                const year = data.release_date?.substring(0, 4) || data.first_air_date?.substring(0, 4) || 'N/A';
                const rating = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
                const seasonsLabel = type === 'tv' && data.number_of_seasons
                    ? `<span id="durationBadge">${data.number_of_seasons} temporada${data.number_of_seasons === 1 ? '' : 's'}</span>`
                    : `<span id="durationBadge">${data.runtime || 'HD'} min</span>`;
                const imdbId = data.external_ids?.imdb_id;
                const imdbBadgeHtml = imdbId ? `<a id="imdbId" href="https://www.imdb.com/title/${imdbId}/" target="_blank" rel="noopener noreferrer" tabindex="-1">${imdbId}</a>` : '';
                const badgeText = window.vaPlayer ? window.vaPlayer.getQualityBadgeText(file_name, res, src) : [(src || '').toUpperCase(), res].filter(Boolean).join(' ');
                const badgeHtml = badgeText ? `<span id="qualityBadge" class="quality-badge">${badgeText}</span>` : '';
                const genresHtml = data.genres && data.genres.length > 0
                    ? `<span id="genresBadge">${data.genres.slice(0, 2).map(g => g.name).join(' / ')}</span>`
                    : '';
                const countryHtml = data.production_countries && data.production_countries.length > 0
                    ? `<span id="countryBadge">${data.production_countries[0].name}</span>`
                    : '';
                document.getElementById('meta').innerHTML = `
                    ${imdbBadgeHtml}
                    ${badgeHtml}
                    ${genresHtml}
                    ${countryHtml}
                    <span id="yearBadge">${year}</span>
                    <span id="ratingBadge">⭐ ${rating}</span>
                    ${seasonsLabel}
                    <span id="typeBadge">${type === 'movie' ? 'Película' : 'Serie'}</span>
                `;

                const mainValidation = await validarPeliculaFinal(imdbId || id, type);

                // Usar el file_name, resolution y source de la validación real (basada en el IMDB ID
                // correcto del contenido), no los parámetros URL que podrían ser de otra película.
                const validated_file_name = mainValidation.file_name || '';
                const validated_res = mainValidation.resolution || res;
                const validated_src = mainValidation.source || src;

                // Actualizar el filename display con el dato verificado
                if (validated_file_name) {
                    filenameDisplay.textContent = `(${validated_file_name})`;
                    filenameDisplay.style.display = 'block';
                } else {
                    filenameDisplay.style.display = 'none';
                }

                // Actualizar el quality badge con los datos verificados
                const validatedBadgeText = window.vaPlayer
                    ? window.vaPlayer.getQualityBadgeText(validated_file_name, validated_res, validated_src)
                    : [(validated_src || '').toUpperCase(), validated_res].filter(Boolean).join(' ');
                const qualityBadgeEl = document.getElementById('qualityBadge');
                if (qualityBadgeEl) {
                    if (validatedBadgeText) {
                        qualityBadgeEl.textContent = validatedBadgeText;
                    } else {
                        qualityBadgeEl.style.display = 'none';
                    }
                }

                if (mainValidation.disponible === false) {
                    const playBtn = document.getElementById('play-btn');
                    if (playBtn) {
                        playBtn.style.opacity = '0.5';
                        playBtn.style.pointerEvents = 'none';
                        playBtn.innerHTML = '<span class="material-icons">block</span> No Disponible';
                    }
                }

                if (mainValidation.disponible !== false) {
                    if (!VERIFY_DISPONIBILIDAD) {
                        document.getElementById('meta').innerHTML += ` <span id="verificationBadge" style="color:#ff9800; border-color:#ff9800; background:rgba(255,152,0,0.1); display: inline-flex; align-items: center;"><i class="material-icons" style="font-size:16px; margin-right:6px;">help_outline</i>Sin Verificar</span>`;
                    }
                }

                const movieObj = {
                    id: imdbId || id,
                    tmdbId: id,
                    l: title,
                    y: year,
                    rating: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                    qid: type === 'movie' ? 'movie' : 'tvSeries',
                    file_name: validated_file_name || file_name,
                    i: data.poster_path ? { imageUrl: `https://image.tmdb.org/t/p/w200${data.poster_path}` } : null
                };
                saveToHistory(movieObj);

                if (data.backdrop_path) {
                    document.getElementById('hero').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                }

                const trailerKey = await window.tmdb.getTrailerKey(id, type);
                if (trailerKey) {
                    const container = document.getElementById('trailerContainer');
                    container.innerHTML = `<div class="trailer-placeholder"><span class="material-icons">play_circle_filled</span><p>Cargando trailer...</p></div>`;
                    iniciarReproductorYouTube(trailerKey);
                } else {
                    mostrarErrorTrailer(title);
                }

                const similarTitle = document.getElementById('similarTitle');
                similarTitle.textContent = type === 'movie' ? 'Películas Recomendadas' : 'Series Recomendadas';
                const carousel = document.getElementById('carousel');
                const similares = data.recommendations?.results?.slice(0, 5) || [];

                if (similares.length > 0) {
                    const batchResults = await Promise.all(similares.map(async (item) => {
                        let imdbId = item.id;
                        try {
                            const extData = await window.tmdb.getExternalIds(item.id, type);
                            if (extData.imdbId) imdbId = extData.imdbId;
                        } catch (e) { }
                        const validation = await validarPeliculaFinal(imdbId, type);
                        if (BLOCK_LOW_RES) {
                            const badgeText = window.vaPlayer
                                ? window.vaPlayer.getQualityBadgeText(validation.file_name, validation.resolution, validation.source).toUpperCase()
                                : [(validation.source || '').toUpperCase(), validation.resolution].filter(Boolean).join(' ').toUpperCase();

                            const isHidden = HIDDEN_RESOLUTIONS.some(res => badgeText.includes(res));

                            if (isHidden) {
                                return null;
                            }
                        }
                        return { ...item, validation, imdbId };
                    }));
                    const validSimilares = batchResults.filter(Boolean);
                    if (validSimilares.length > 0) {
                        carousel.innerHTML = validSimilares.map((item, index) => {
                            const itemTitle = item.title || item.name || 'Sin título';
                            const imageUrl = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
                            const year = item.release_date ? item.release_date.substring(0, 4) : (item.first_air_date ? item.first_air_date.substring(0, 4) : '');
                            const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
                            const typeDisplay = type === 'movie' ? 'PELÍCULA' : 'SERIE';
                            const val = item.validation;
                            const unavailableClass = val.disponible === false ? ' unavailable' : '';
                            const disponibleBadge = val.disponible === false ? '<div class="availability-badge unavailable">No disponible</div>' : '';
                            const cBadgeText = window.vaPlayer ? window.vaPlayer.getQualityBadgeText(val.file_name, val.resolution, val.source) : [(val.source || '').toUpperCase(), val.resolution].filter(Boolean).join(' ');
                            const extraBadges = val.disponible !== false && cBadgeText ? `<div class="info-badge">${cBadgeText}</div>` : '';
                            let verifiedIndicator = '';
                            if (val.disponible !== false) {
                                if (!VERIFY_DISPONIBILIDAD) {
                                    verifiedIndicator = `<div class="not-verified-badge" title="Disponibilidad Sin Verificar"><span class="material-icons" style="font-size: 11px;">help_outline</span> Sin Verificar</div>`;
                                }
                            }
                            let url = `content.html?id=${item.id}&type=${type}`;
                            if (val.file_name) url += `&file_name=${encodeURIComponent(val.file_name)}`;
                            if (val.resolution) url += `&res=${encodeURIComponent(val.resolution)}`;
                            if (val.source) url += `&src=${encodeURIComponent(val.source)}`;
                            return `<div class="movie-card navigable${unavailableClass}" tabindex="0" onclick="window.location.href='${url}'" onkeydown="if(event.key==='Enter') this.click()" aria-label="${itemTitle}">
                                <div class="type-badge">${typeDisplay}</div>
                                ${verifiedIndicator}
                                ${extraBadges}
                                ${disponibleBadge}
                                <img src="${imageUrl}" class="movie-poster" alt="${itemTitle}" loading="lazy">
                                <div class="movie-info">
                                    <div class="movie-meta">
                                        <span class="movie-year">${year}</span>
                                    </div>
                                    <h3 class="movie-title">${itemTitle}</h3>
                                </div>
                                <span class="movie-rating">★ ${rating}</span>
                            </div>`;
                        }).join('');
                    } else {
                        carousel.innerHTML = '<div style="color:#888; text-align:center; padding:40px; grid-column: 1 / -1;">No hay contenido relacionado disponible</div>';
                    }
                } else {
                    carousel.innerHTML = '<div style="color:#888; text-align:center; padding:40px; grid-column: 1 / -1;">No hay contenido relacionado disponible</div>';
                }

                carousel.setAttribute('aria-label', type === 'movie' ? 'Películas relacionadas' : 'Series relacionadas');

                const seasonSelect = document.getElementById('season-select');
                const episodeSelect = document.getElementById('episode-select');
                if (type === 'tv' && data.seasons) {
                    seasonSelect.style.display = 'inline-block';
                    episodeSelect.style.display = 'inline-block';
                    const validSeasons = data.seasons.filter(s => s.season_number > 0);
                    if (validSeasons.length > 0) {
                        seasonSelect.innerHTML = validSeasons.map(s => `<option value="${s.season_number}" data-episodes="${s.episode_count}">Temporada ${s.season_number}</option>`).join('');
                        const updateEpisodes = () => {
                            const selectedOption = seasonSelect.options[seasonSelect.selectedIndex];
                            const episodeCount = parseInt(selectedOption.getAttribute('data-episodes')) || 1;
                            let episodesHtml = '';
                            for (let i = 1; i <= episodeCount; i++) episodesHtml += `<option value="${i}">Capítulo ${i}</option>`;
                            episodeSelect.innerHTML = episodesHtml;
                        };
                        seasonSelect.addEventListener('change', () => {
                            updateEpisodes();
                            fetchSubtitles(imdbId, type, seasonSelect.value, episodeSelect.value, file_name);
                        });
                        episodeSelect.addEventListener('change', () => {
                            fetchSubtitles(imdbId, type, seasonSelect.value, episodeSelect.value, file_name);
                        });
                        updateEpisodes();
                        fetchSubtitles(imdbId, type, seasonSelect.value, episodeSelect.value, file_name);
                    }
                } else {
                    fetchSubtitles(imdbId, type, undefined, undefined, file_name);
                }

                const playBtn = document.getElementById('playBtn');
                const handlePlay = async () => {
                    const subId = document.getElementById('sub-select').value;
                    let finalId = imdbId || id;
                    let s = null;
                    let e = null;

                    if (type === 'tv') {
                        s = seasonSelect.value;
                        e = episodeSelect.value;
                    }

                    const params = {
                        skin: 'netflix',
                        sub_default: '1'
                    };

                    let playUrl = window.vaPlayer.embedUrl(finalId, type, s, e, params);

                    if (subId) {
                        const originalHtml = playBtn.innerHTML;
                        playBtn.innerHTML = '<span class="material-icons">hourglass_empty</span> Cargando...';
                        playBtn.style.pointerEvents = 'none';
                        try {
                            const subUrl = await window.openSubtitles.getDownloadLink(subId);
                            if (subUrl) {
                                playUrl += `&sub_url=${encodeURIComponent(subUrl)}&sub_label=Espa%C3%B1ol&sub_lang=eng&sub_on=1&disable_embedded_subs=1`;
                            }
                        } catch (err) {
                            console.error('Error fetching subtitles', err);
                        }
                        playBtn.innerHTML = originalHtml;
                        playBtn.style.pointerEvents = 'auto';
                    }
                    window.location.href = playUrl;
                };
                if (playBtn) {
                    playBtn.onclick = () => handlePlay();
                    playBtn.focus();
                }

                // Configurar el botón de Favorito
                const favoriteBtn = document.getElementById('favoriteBtn');
                if (favoriteBtn) {
                    favoriteBtn.style.display = 'flex'; // Make visible immediately

                    const checkIsFav = () => {
                        const targetId = imdbId || id;
                        if (typeof esFavorito === 'function') {
                            return esFavorito(targetId);
                        }
                        // Fallback in case auth-drive.js is still parsing
                        try {
                            const config = JSON.parse(localStorage.getItem('mauritv_config') || '{}');
                            const favs = config.favorites || [];
                            return favs.some(f => String(f.id) === String(targetId));
                        } catch (e) {
                            return false;
                        }
                    };

                    const updateFavoriteUI = () => {
                        const isFav = checkIsFav();
                        if (isFav) {
                            favoriteBtn.innerHTML = `<span class="material-icons">remove</span> Quitar de favoritos`;
                        } else {
                            favoriteBtn.innerHTML = `<span class="material-icons">add</span> Agregar a favorito`;
                        }
                    };

                    updateFavoriteUI(); // Update instantly without delay

                    favoriteBtn.onclick = () => {
                        const isFav = checkIsFav();
                        const targetId = imdbId || id;
                        if (isFav) {
                            if (typeof removerFavorito === 'function') removerFavorito(targetId);
                        } else {
                            if (typeof agregarFavorito === 'function') agregarFavorito(movieObj);
                        }
                        setTimeout(updateFavoriteUI, 50);
                    };

                    // El browser dispara un click nativo al presionar Enter en un <button>
                    // El handler global TAMBIÉN llama active.click() → doble toggle → estado no cambia
                    // Prevenimos el click nativo del browser; el handler global se encarga de disparar onclick una sola vez
                    favoriteBtn.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault(); // cancela el click nativo del navegador
                        }
                    });
                }
            } catch (err) {
                console.error('Error loading content:', err);
                document.getElementById('title').textContent = 'Error loading content';
                mostrarErrorTrailer();
            }
        }

        // validarPeliculaFinal removida, ahora provista por verify.js

        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                const active = document.activeElement;
                if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) return;
                if (e.key === 'Enter') {
                    if (active.tagName === 'SELECT') {
                        try {
                            if (typeof active.showPicker === 'function') active.showPicker();
                            else { const event = new MouseEvent('mousedown', { bubbles: true, cancelable: true, view: window }); active.dispatchEvent(event); }
                        } catch (err) { }
                        return;
                    }
                    if (active.classList.contains('navigable') || active.tagName === 'A' || active.tagName === 'BUTTON') {
                        active.click();
                        return;
                    }
                }
                const navigables = Array.from(document.querySelectorAll('.navigable, button, select, input, .trailer-container, .movie-card, .person-link')).filter(el => {
                    if (el.style.display === 'none') return false;
                    const r = el.getBoundingClientRect();
                    return r.width > 0 && r.height > 0;
                });
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    const rect = active.getBoundingClientRect();
                    let closest = null;
                    let minDistance = Infinity;
                    navigables.forEach((el) => {
                        if (el === active) return;
                        const elRect = el.getBoundingClientRect();
                        const activeCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                        const elCenter = { x: elRect.left + elRect.width / 2, y: elRect.top + elRect.height / 2 };
                        let isCandidate = false;
                        const isTrailer = el.id === 'trailerContainer';
                        const vThreshold = 5;
                        const hThreshold = 40;
                        if (e.key === 'ArrowUp' && elRect.bottom <= rect.top + vThreshold && elCenter.y < activeCenter.y) isCandidate = true;
                        else if (e.key === 'ArrowDown' && elRect.top >= rect.bottom - vThreshold && elCenter.y > activeCenter.y) isCandidate = true;
                        else if (e.key === 'ArrowLeft' && elRect.right <= rect.left + hThreshold) isCandidate = true;
                        else if (e.key === 'ArrowRight' && (elRect.left >= rect.right - hThreshold || (isTrailer && elRect.left > rect.left))) isCandidate = true;
                        if (isCandidate) {
                            let dx = Math.max(0, elRect.left - rect.right, rect.left - elRect.right);
                            let dy = Math.max(0, elRect.top - rect.bottom, rect.top - elRect.bottom);
                            const centerDistX = Math.abs(elCenter.x - activeCenter.x);
                            const centerDistY = Math.abs(elCenter.y - activeCenter.y);
                            let score;
                            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') score = dy * 10 + centerDistX;
                            else score = dx * 2 + centerDistY * (isTrailer ? 0.5 : 2);
                            if (score < minDistance) { minDistance = score; closest = el; }
                        }
                    });
                    if (closest) { closest.focus(); closest.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
            });
        }

        loadContent();
        setupKeyboardNavigation();
    </script>

    <script>
        if (window.location.protocol !== 'file:') {
            // Librería para la API de Google (Drive v3)
            const scriptGapi = document.createElement('script');
            scriptGapi.src = "https://apis.google.com/js/api.js";
            scriptGapi.async = true;
            scriptGapi.defer = true;
            scriptGapi.onload = function () { if (typeof gapiLoaded === 'function') gapiLoaded(); };
            document.body.appendChild(scriptGapi);

            // Librería de Google Identity Services (GSI)
            const scriptGis = document.createElement('script');
            scriptGis.src = "https://accounts.google.com/gsi/client";
            scriptGis.async = true;
            scriptGis.defer = true;
            scriptGis.onload = function () { if (typeof gisLoaded === 'function') gisLoaded(); };
            document.body.appendChild(scriptGis);
        } else {
            console.warn("Google Drive Sync and Authentication are disabled when running via file:// protocol.");
