<iframe id="pf" src="https://brightpathsignals.com/embed/tv/tt0220008" allow="autoplay;fullscreen;picture-in-picture;encrypted-media" allowfullscreen referrerpolicy="origin"></iframe>
<script>
(function(){
    var f=document.getElementById('pf');
    var pfx=['va_','player','subtitleLang','last_ep_','watch_'];

    function collectStorage(){
        var d={};
        try{
            for(var i=0;i<localStorage.length;i++){
                var k=localStorage.key(i);
                for(var j=0;j<pfx.length;j++){
                    if(k.indexOf(pfx[j])===0){d[k]=localStorage.getItem(k);break;}
                }
            }
        }catch(e){}
        return d;
    }

    window.addEventListener('message',function(e){
        if(e.source!==f.contentWindow)return;
        var d=e.data;
        if(!d||typeof d!=='object')return;
        if(d.type==='STORAGE_GET_ALL'){
            f.contentWindow.postMessage({type:'STORAGE_INIT',data:collectStorage()},'*');
            return;
        }
        if(d.type==='PLAYER_TITLE'&&d.title){document.title=d.title;}
        if(d.type==='STORAGE_SET'&&d.key){try{localStorage.setItem(d.key,d.value);}catch(x){}}
        if(d.type==='STORAGE_REMOVE'&&d.key){try{localStorage.removeItem(d.key);}catch(x){}}
        if(d.type==='CURSOR_HIDE'){document.body.style.cursor='none';document.documentElement.style.cursor='none';f.style.cursor='none';}
        if(d.type==='CURSOR_SHOW'){document.body.style.cursor='';document.documentElement.style.cursor='';f.style.cursor='';}
        if(window.parent!==window){window.parent.postMessage(d,'*');}
    });
})();
</script>
