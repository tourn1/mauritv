<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Validación Final - MauriTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --success: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .id-label {
            font-weight: 600;
            color: #94a3b8;
        }
        .status {
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .status.true { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status.false { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        .status.loading { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #log {
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            font-family: monospace;
            font-size: 0.8rem;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            color: #ccc;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test de Validación</h1>
        <div id="results">
            <div class="result-item">
                <span class="id-label">tt1431045 (Deadpool)</span>
                <span id="res-1" class="status loading">Esperando...</span>
            </div>
            <div class="result-item">
                <span class="id-label">tt0275994 (Inexistente/404)</span>
                <span id="res-2" class="status loading">Esperando...</span>
            </div>
        </div>
        <button id="runBtn" onclick="runTest()">Ejecutar Test</button>
    </div>
    <div id="log"></div>

    <script src="validation.js"></script>
    <script>
        const originalConsoleLog = console.log;
        const originalConsoleWarn = console.warn;
        const logEl = document.getElementById('log');

        function addToLog(msg, type = 'info') {
            const line = document.createElement('div');
            line.textContent = `[${type}] ${msg}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        console.log = (...args) => {
            originalConsoleLog(...args);
            addToLog(args.join(' '), 'log');
        };
        console.warn = (...args) => {
            originalConsoleWarn(...args);
            addToLog(args.join(' '), 'warn');
        };

        async function runTest() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            
            const res1El = document.getElementById('res-1');
            const res2El = document.getElementById('res-2');
            
            res1El.textContent = 'Validando...';
            res2El.className = 'status loading';
            res2El.textContent = 'Esperando...';
            
            // Test 1: Deadpool
            const pelicula1 = await validarPeliculaFinal('tt1431045');
            res1El.textContent = pelicula1 ? 'DISPONIBLE' : 'NO DISPONIBLE';
            res1El.className = `status ${pelicula1}`;
            
            res2El.textContent = 'Validando...';
            res2El.className = 'status loading';

            // Test 2: 404
            const pelicula2 = await validarPeliculaFinal('tt0275994');
            res2El.textContent = pelicula2 ? 'DISPONIBLE' : 'NO DISPONIBLE';
            res2El.className = `status ${pelicula2}`;
            
            btn.disabled = false;
        }
    </script>
</body>
</html>
