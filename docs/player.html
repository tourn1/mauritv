<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>MauriTV - Reproductor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-color: #141414;
            --accent-color: #e50914;
            --focus-border: 4px solid #ffffff;
            --netflix-font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: var(--netflix-font);
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .player-controls {
            width: 100%;
            flex-shrink: 0;
            display: none !important;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box;
            z-index: 10001;
            min-height: 54px;
        }

        .controls-sensor {
            display: none;
        }

        .close-btn {
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: white;
            padding: 9px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            white-space: nowrap;
            pointer-events: auto;
        }

        .close-btn .material-icons {
            font-size: 1.1rem;
        }

        .close-btn:hover,
        .close-btn:focus {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: scale(1.05);
            outline: var(--focus-border) !important;
            outline-offset: 4px !important;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        .player-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        #player-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .player-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            color: white;
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .player-loader.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .player-loader .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
        }

        .player-loader p {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin: 0;
            opacity: 0.8;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .navigable:focus,
        [tabindex]:focus,
        button:focus,
        iframe:focus {
            outline: var(--focus-border) !important;
            outline-offset: 2px !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3) !important;
        }

        #player-iframe:focus {
            outline-offset: -4px !important;
        }

        @media (max-width: 600px) {
            .close-btn {
                padding: 7px 12px;
                font-size: 0.8rem;
                gap: 5px;
            }

            .close-btn .material-icons {
                font-size: 1rem;
            }
        }

        @media (max-width: 380px) {
            .close-btn span:not(.material-icons) {
                display: none;
            }

            .close-btn {
                padding: 8px;
                border-radius: 50%;
            }
        }

        /* Cursor Virtual */
        #virtual-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            z-index: 2147483647; /* Máximo posible */
            pointer-events: none;
            display: none;
            color: white;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: left 0.1s ease-out, top 0.1s ease-out;
        }
        #virtual-cursor .material-icons {
            font-size: 30px;
            transform: rotate(-20deg);
        }
    </style>
</head>

<body class="tv-mode">
    <div id="player-modal" class="player-modal">
        <div id="controls-sensor" class="controls-sensor"></div>
        <div class="player-controls">
            <button id="close-player" class="close-btn navigable" tabindex="1">
                <span class="material-icons">arrow_back</span>
                <span>Volver</span>
            </button>
            <button id="download-player" class="close-btn navigable hidden" tabindex="2">
                <span class="material-icons">download</span>
                <span>Descargar</span>
            </button>
        </div>
        <div class="player-container">
            <div id="player-loader" class="player-loader">
                <div class="spinner"></div>
                <p>Cargando fuente...</p>
            </div>
            <iframe id="player-iframe" class="navigable" tabindex="3" src=""
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                sandbox="allow-scripts allow-same-origin allow-forms allow-top-navigation-by-user-activation"
                allowfullscreen></iframe>
        </div>
    </div>

    <div id="virtual-cursor">
        <span class="material-icons">navigation</span>
    </div>

    <script>
        // Elementos del DOM
        const playerIframe = document.getElementById('player-iframe');
        const playerLoader = document.getElementById('player-loader');
        const closePlayerBtn = document.getElementById('close-player');

        // Virtual Cursor State
        let lastEnterPress = 0;
        let enterPressCount = 0;
        let isCursorActive = false;
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        const cursorSpeed = 30;

        // Configuración de valores por defecto
        const DEFAULT_ID = '1226863';
        const DEFAULT_TYPE = 'movie';
        const DEFAULT_IMDB = 'tt28650488';
        const DEFAULT_LANG = 'es';
        const DEFAULT_SUB_ID = '12537483';

        // Parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const imdbId = urlParams.get('imdb');
        const type = urlParams.get('type') || DEFAULT_TYPE;
        const season = urlParams.get('s');
        const episode = urlParams.get('e');
        const langCode = urlParams.get('lang') || DEFAULT_LANG;
        const subId = urlParams.get('sub_id') || DEFAULT_SUB_ID;

        // Identificador final (IMDB tiene prioridad, luego ID, luego valores por defecto)
        const finalId = imdbId || movieId || DEFAULT_IMDB || DEFAULT_ID;

        // Configuraciones disponibles para VidAPI (https://vidapi.ru/api)
        const CONF_COLOR = ''; // Hex code
        const CONF_PRIMARY_COLOR = ''; // Color principal (ej: #e50914)
        const CONF_TITLE = ''; // Título personalizado
        const CONF_POSTER = ''; // URL del póster personalizado
        const CONF_SHOW_TITLE = ''; // true | false
        const CONF_START_AT = ''; // Tiempo de inicio en segundos
        const CONF_RESUME_AT = ''; // Tiempo de continuación
        const CONF_SUB_URL = ''; // URL para subtítulos (se asigna dinámicamente si hay subId)
        const CONF_SUB_FILE = ''; // Archivo de subtítulo
        const CONF_SUB_LABEL = 'Español'; // Etiqueta del idioma del subtítulo (ej: Español)
        const CONF_SUB_LANG = 'es'; // Código del lenguaje del subtítulo
        const CONF_SUB_DEFAULT = '1'; // Forzar subtítulo por defecto (1 o true)
        const CONF_DS_LANG = ''; // Lenguaje de doblaje
        const CONF_LANG = ''; // Lenguaje de la interfaz del player
        const CONF_THUMBNAILS = ''; // Habilitar miniaturas

        // Configuraciones internas
        const PLAYER_HOST = 'https://vaplayer.ru';
        const CONF_SKIN = 'netflix';

        /**
         * Detecta si el dispositivo es Smart TV o Android TV para ocultar controles
         * @returns {boolean}
         */
        const isTvDevice = () => {
            return 'true';
            //const ua = navigator.userAgent.toLowerCase();
            //return ua.includes('android') && (ua.includes('tv') || ua.includes('large screen') || ua.includes('atv'));
        };

        const CONF_CONTROLS = isTvDevice() ? 'false' : '';

        /**
         * Mapea un código de idioma corto (es, en) a ISO 639-2 requerido por el reproductor
         * @param {string} lang Código de 2 letras
         * @returns {string} Código de 3 letras (spa, eng)
         */
        const getSubtitleLangCode = (lang) => {
            const map = { es: 'spa', en: 'eng', pt: 'por', fr: 'fra', it: 'ita' };
            return map[lang] || lang;
        };

        /**
         * Obtiene la URL de descarga directa de OpenSubtitles
         * @param {string} fileId ID del subtítulo
         * @returns {Promise<string|null>} Enlace del subtítulo o nulo
         */
        const getDownloadLink = async (fileId) => {
            try {
                const res = await fetch('https://api.opensubtitles.com/api/v1/download', {
                    method: 'POST',
                    headers: {
                        'Api-Key': 'SQMOf8KwHb06tmTZjKFAOEACEbKSQ25G',
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ file_id: fileId }),
                    referrer: 'https://www.opensubtitles.com/',
                    referrerPolicy: 'origin'
                });
                if (!res.ok) throw new Error(`API error: ${res.status}`);

                return (await res.json()).link;
            } catch (e) {
                console.error("Error al obtener link de descarga", e);
                return null;
            }
        };

        /**
         * Configura e inicializa el iframe del reproductor
         */
        const initPlayer = async () => {
            if (!finalId || !type) {
                window.location.href = 'index.html';
                return;
            }

            const isoLangCode = getSubtitleLangCode(langCode);
            const params = new URLSearchParams();

            // Asignación de configuraciones definidas
            if (CONF_SKIN) params.append('skin', CONF_SKIN);
            if (CONF_CONTROLS) params.append('controls', CONF_CONTROLS);
            if (CONF_COLOR) params.append('color', CONF_COLOR);
            if (CONF_PRIMARY_COLOR) params.append('primaryColor', CONF_PRIMARY_COLOR);
            if (CONF_TITLE) params.append('title', CONF_TITLE);
            if (CONF_POSTER) params.append('poster', CONF_POSTER);
            if (CONF_SHOW_TITLE) params.append('showTitle', CONF_SHOW_TITLE);
            if (CONF_START_AT) params.append('startAt', CONF_START_AT);
            if (CONF_RESUME_AT) params.append('resumeAt', CONF_RESUME_AT);
            if (CONF_SUB_DEFAULT) params.append('sub_default', CONF_SUB_DEFAULT);
            if (CONF_DS_LANG) params.append('ds_lang', CONF_DS_LANG);
            if (CONF_LANG) params.append('lang', CONF_LANG);
            if (CONF_THUMBNAILS) params.append('thumbnails', CONF_THUMBNAILS);

            let endpoint = type === 'tv' && season && episode ? `/embed/tv/${finalId}/${season}/${episode}/` : `/embed/movie/${finalId}`;
            let playUrl = `${PLAYER_HOST}${endpoint}?${params.toString()}`;

            // Gestión de subtítulos externos si se provee el subId
            if (subId) {
                const statusText = playerLoader.querySelector('p');
                if (statusText) statusText.textContent = 'Cargando subtítulos externos...';

                const subUrl = await getDownloadLink(subId);

                //window.open(subUrl, '_blank');


                if (subUrl) {
                    const subtitleLabel = langCode === 'es' ? 'Español' : 'English';
                    // Truco: Usamos sub_lang=eng para que el reproductor lo considere como la pista principal
                    // de inglés y lo elija por encima del embebido, pero mantenemos la etiqueta 'Español'
                    playUrl += `&sub_url=${encodeURIComponent(subUrl)}&sub_label=${encodeURIComponent(subtitleLabel)}&sub_lang=eng&sub_on=1&sub_default=1&disable_embedded_subs=1`;
                }
            }

            playerIframe.src = playUrl;
        };

        /**
         * Envía preferencias de subtítulos y configuraciones iniciales al reproductor via postMessage
         */
        const sendStorageInit = () => {
            if (playerIframe?.contentWindow) {
                // Si hay subId, engañamos al player diciendo que preferimos 'eng'
                const effectiveLang = subId ? 'eng' : getSubtitleLangCode(langCode);

                const storageData = {
                    'playerSubStyle': JSON.stringify({ color: "#f7eeee", bg: "#000000", bgAlpha: 80, size: 180, font: "inherit" }),
                    'subtitleLang': effectiveLang,
                    'lastSubLang': langCode
                };
                playerIframe.contentWindow.postMessage({ type: 'STORAGE_INIT', data: storageData }, '*');
            }
        };

        /**
         * Simula un clic centrado para interactuar con políticas de autoplay en navegadores
         */
        const simulateClickOnPlayer = () => {
            try {
                const rect = playerIframe.getBoundingClientRect();
                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true,
                    clientX: rect.left + (rect.width / 2),
                    clientY: rect.top + (rect.height / 2)
                });
                playerIframe.dispatchEvent(clickEvent);
            } catch (err) {
                console.warn('No se pudo simular el clic:', err);
            }
        };

        /**
         * Previene la apertura de pop-ups bloqueando las llamadas window.open dentro del iframe
         */
        const preventIframePopups = () => {
            try {
                const iframeWin = playerIframe.contentWindow;
                if (iframeWin) {
                    iframeWin.open = () => null;
                    Object.defineProperty(iframeWin, 'top', { get: () => iframeWin });
                    Object.defineProperty(iframeWin, 'parent', { get: () => iframeWin });
                }
            } catch (e) { }
        };

        /**
         * Maneja eventos de navegación en teclado / mando a distancia
         * @param {KeyboardEvent} e
         */
        const handleKeydown = (e) => {
            const backKeys = ['Escape', 'Backspace', 'Back', 'BrowserBack', 'GoBack'];
            if (backKeys.includes(e.key) || [8, 27, 10009, 461].includes(e.keyCode)) {
                closePlayerBtn.click();
                return;
            }

            // --- Lógica de Triple Click Enter para Cursor ---
            if (e.key === 'Enter' || e.key === 'Select' || e.keyCode === 23 || e.keyCode === 13 || e.keyCode === 66) {
                const now = Date.now();
                if (now - lastEnterPress < 600) {
                    enterPressCount++;
                } else {
                    enterPressCount = 1;
                }
                lastEnterPress = now;

                if (enterPressCount === 3) {
                    isCursorActive = !isCursorActive;
                    const cursorEl = document.getElementById('virtual-cursor');
                    if (isCursorActive) {
                        cursorEl.style.display = 'block';
                        cursorEl.style.left = cursorX + 'px';
                        cursorEl.style.top = cursorY + 'px';
                    } else {
                        cursorEl.style.display = 'none';
                    }
                    enterPressCount = 0;
                    return;
                }
            }

            // --- Control del Cursor Virtual ---
            if (isCursorActive) {
                const cursorEl = document.getElementById('virtual-cursor');
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    if (e.key === 'ArrowUp') cursorY = Math.max(0, cursorY - cursorSpeed);
                    if (e.key === 'ArrowDown') cursorY = Math.min(window.innerHeight, cursorY + cursorSpeed);
                    if (e.key === 'ArrowLeft') cursorX = Math.max(0, cursorX - cursorSpeed);
                    if (e.key === 'ArrowRight') cursorX = Math.min(window.innerWidth, cursorX + cursorSpeed);

                    cursorEl.style.left = cursorX + 'px';
                    cursorEl.style.top = cursorY + 'px';
                    return;
                }

                if (e.key === 'Enter' || e.key === 'Select' || e.keyCode === 23 || e.keyCode === 13 || e.keyCode === 66) {
                    e.preventDefault();
                    const target = document.elementFromPoint(cursorX, cursorY);
                    if (target) {
                        target.click();
                        if (target.tagName === 'INPUT') target.focus();
                    }
                    return;
                }
            }

            const active = document.activeElement;
            const navigables = Array.from(document.querySelectorAll('.navigable')).filter(el => {
                const r = el.getBoundingClientRect();
                return r.width > 0 && r.height > 0 && !el.classList.contains('hidden');
            });

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const currentIndex = navigables.indexOf(active);

                if (currentIndex === -1) {
                    navigables[0]?.focus();
                    return;
                }

                if (e.key === 'ArrowRight' && currentIndex < navigables.length - 1) navigables[currentIndex + 1].focus();
                else if (e.key === 'ArrowLeft' && currentIndex > 0) navigables[currentIndex - 1].focus();
                else if (e.key === 'ArrowDown') playerIframe.focus();
                else if (e.key === 'ArrowUp') navigables[0].focus();
            }

            if (e.key === 'Enter' && active !== playerIframe) {
                active.click();
            }
        };

        /**
         * Oculta el cargador con una transición suave
         */
        const hideLoader = () => {
            if (!playerLoader.classList.contains('fade-out')) {
                playerLoader.classList.add('fade-out');
                if (window.safetyTimeout) clearTimeout(window.safetyTimeout);
                // Enfocar el iframe después de ocultar el cargador
                setTimeout(() => {
                    playerIframe.focus();
                    preventIframePopups();
                }, 600);
            }
        };

        // Escuchadores de eventos y Lifecycle del player
        playerIframe.onload = () => {
            // Un pequeño delay para asegurar que el contenido interno haya empezado a renderizar
            setTimeout(hideLoader, 500);

            // Envío persistente de configuración para asegurar que se mantenga el idioma seleccionado
            // Esto combate el comportamiento del player que a veces recarga pistas embebidas tras iniciar
            const sendWithPersistence = () => {
                sendStorageInit();
                // Reintentamos en tiempos clave (1s, 2s, 3s, 5s) donde el player suele estabilizar sus pistas
                [1000, 2000, 3000, 5000].forEach(ms => setTimeout(sendStorageInit, ms));
            };

            sendWithPersistence();

            // Interacción automatizada para activar el reproductor
            setTimeout(simulateClickOnPlayer, 5000);
        };

        // Timeout de seguridad: Si el iframe no carga en 12 segundos, ocultamos el spinner igual
        // para permitir que el usuario vea si hay algún error o control del propio player.
        window.safetyTimeout = setTimeout(hideLoader, 12000);

        closePlayerBtn.addEventListener('click', () => window.location.href = 'index.html');
        document.addEventListener('keydown', handleKeydown);
        window.addEventListener('message', (e) => {
            // Si el player envía cualquier mensaje, es señal de que ya está vivo
            if (e.data) {
                if (e.data.type === 'STORAGE_GET_ALL') {
                    sendStorageInit();
                }
                // Si recibimos señales comunes de que el video está listo o cargando, podemos ocultar nuestro spinner
                const readyTypes = ['ready', 'playing', 'canplay', 'loadedmetadata'];
                if (readyTypes.includes(e.data.type) || readyTypes.includes(e.data.event)) {
                    hideLoader();
                }
            }
        });

        // Inicializar el flujo
        initPlayer();
    </script>
</body>

</html>
