<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#141414" />

    <title>MauriTV</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* ========== CSS VARIABLES ========== */
        :root {
            --bg: #141414;
            --bg-secondary: #1b1b1b;
            --card: rgba(255, 255, 255, 0.06);
            --card-bg: #181818;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #e50914;
            --accent-hover: #ff1f29;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            --transition-speed: 0.3s;
        }

        /* ========== RESET & BASE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
        }

        main {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== NAVIGATION ========== */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 100;
            transition: 0.25s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        /* ========== HERO SECTION ========== */
        .hero-section {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            padding: 80px 40px 20px;
            background-color: #000;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            min-height: 0;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, #141414 5%, rgba(20, 20, 20, 0.35) 40%, rgba(20, 20, 20, 0.2) 100%),
                linear-gradient(to right, rgba(20, 20, 20, 0.96) 15%, rgba(20, 20, 20, 0.7) 40%, transparent 70%);
        }

        .hero-layout {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            height: 100%;
        }

        .hero-title-wrapper {
            grid-column: 1 / -1;
            width: 100%;
        }

        .hero-content {
            width: 100%;
            max-width: 100%;
            max-height: 100%;
            animation: fadeUp 0.8s ease;
            overflow-y: auto;
            padding: 10px 20px 10px 10px;
        }

        .hero-content::-webkit-scrollbar {
            width: 6px;
        }

        .hero-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .hero-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .hero-trailer-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
            z-index: 2;
            animation: fadeUp 0.8s ease 0.2s backwards;
        }

        #filename-display {
            width: 100%;
            display: block;
            background: rgba(0, 0, 0, 0.35);
            padding: 0.45rem 0.65rem;
            border-radius: 12px;
            line-height: 1.4;
            color: rgba(255,255,255,0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            margin-top: -0.5rem;
        }

        @media (min-width: 1025px) {
            .hero-layout {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto 1fr;
            }

            .hero-title-wrapper {
                grid-column: 1 / -1;
            }

            .hero-content {
                grid-column: 1;
                width: 100%;
            }

            .hero-trailer-wrapper {
                grid-column: 2;
            }
        }

        .hero-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            line-height: 0.95;
            margin-bottom: 1rem;
            text-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
            word-break: break-word;
            overflow-wrap: anywhere;
            hyphens: auto;
            white-space: normal;
        }

        .hero-title-wrapper {
            min-width: 0;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.8rem;
        }

        .hero-meta span {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .hero-synopsis {
            font-size: 1.08rem;
            line-height: 1.9;
            color: #e8e8e8;
            margin-bottom: 0.5rem;
            max-width: 650px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .hero-synopsis.expanded {
            -webkit-line-clamp: unset;
        }

        .ver-mas-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            margin-bottom: 1rem;
            text-decoration: underline;
        }

        .hero-cast-director {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 650px;
        }

        .hero-cast-director strong {
            color: var(--text);
        }

        .person-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
            border-bottom: 1px solid transparent;
            cursor: pointer;
        }

        .person-link:hover,
        .person-link:focus {
            color: var(--accent);
            border-bottom-color: var(--accent);
            transform: translateY(-1px);
            outline: none;
        }

        /* Person list (director / cast) */
        .person-list {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-top: 8px;
        }

        .person-item {
            width: 84px;
            text-align: center;
        }

        .person-photo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto;
            border: 2px solid rgba(255,255,255,0.06);
        }

        .person-photo-link {
            display: inline-block;
        }

        .person-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
            max-width: 84px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 1rem;
        }

        .play-button {
            border: none;
            border-radius: 8px;
            padding: 14px 26px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            background: var(--accent);
            color: white;
        }

        .play-button:hover,
        .play-button.selected,
        .play-button:focus {
            background: var(--accent-hover);
            transform: scale(1.04);
            box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.25);
        }

        /* ========== MEDIA SELECTORS ========== */
        .tv-select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.25s;
            max-width: 360px;
        }

        .tv-select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            z-index: 10;
        }

        .tv-select:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .tv-select option {
            background: #1b1b1b;
            color: white;
        }

        /* ========== CONTENT SECTION ========== */
        .content-section {
            padding: 2rem;
            width: 100%;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 24px;
        }

        /* ========== TRAILER ========== */
        .trailer-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 24px;
            background: #0a0a0a;
            box-shadow: var(--shadow);
            margin-top: 0;
            outline: none;
            aspect-ratio: 16 / 9;
        }

        .trailer-container:focus {
            box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.35);
        }

        #youtube-player {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .trailer-placeholder {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            cursor: pointer;
            transition: 0.3s;
            gap: 20px;
        }

        .trailer-placeholder:hover {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        }

        .trailer-placeholder .material-icons {
            font-size: 80px;
            color: #e50914;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            padding: 20px;
        }

        .trailer-placeholder p {
            color: #888;
            font-size: 14px;
        }

        .trailer-error {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            background: #0a0a0a;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .trailer-error .material-icons {
            font-size: 48px;
            margin-bottom: 16px;
            color: #e50914;
        }

        .trailer-error a {
            color: #e50914;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 20px;
            background: rgba(229, 9, 20, 0.2);
            border-radius: 8px;
            transition: 0.25s;
        }

        .trailer-error a:hover {
            background: rgba(229, 9, 20, 0.4);
        }

        /* ========== CAROUSEL ========== */
        .carousel {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            margin-top: 40px;
            padding-bottom: 10px;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        .carousel img {
            width: 260px;
            height: 150px;
            object-fit: cover;
            border-radius: 14px;
            flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .carousel img:hover {
            transform: scale(1.08);
            z-index: 90;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .carousel img:focus {
            outline: 4px solid rgba(229, 9, 20, 0.8);
            outline-offset: 4px;
            transform: scale(1.08);
        }

        /* ========== MOVIE CARDS ========== */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            padding: 1rem 0;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: all var(--transition-speed);
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
            outline: none;
            aspect-ratio: 2/3;
        }

        .movie-card:focus {
            border-color: #ffffff;
            transform: scale(1.1);
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .movie-card:hover {
            transform: scale(1.08);
            z-index: 90;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #252525;
        }

        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            transform: translateY(0);
            transition: transform 0.3s;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ffffff;
            display: inline-block;
            max-width: 100%;
        }

        .movie-card:focus .movie-title {
            color: white !important;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .movie-year {
            font-size: 0.9rem;
            color: #e5e5e5;
        }

        .movie-rating {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.7rem;
            color: #f5c518;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.5));
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(245, 197, 24, 0.3);
            z-index: 10;
        }

        .type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 12;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            text-transform: uppercase;
        }

        /* Badge Disponibilidad */
        .availability-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 12;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .availability-badge.unavailable {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            font-size: 1rem;
            padding: 10px;
            white-space: normal;
        }

        /* Badge de Información Extra (Fuente y Resolución combinadas) */
        .info-badge {
            position: absolute;
            top: 42px;
            /* Debajo del type-badge */
            right: 10px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            z-index: 12;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: rgb(229 9 20 / 17%);
            /* rgba(229, 9, 20, 0.85);  Rojo Netflix/MauriTV */
            color: white;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.5s ease;
        }

        .movie-card.unavailable {
            cursor: default;
        }

        .movie-card.unavailable .movie-poster {
            filter: grayscale(1);
            opacity: 0.5;
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            body {
                height: auto;
                overflow: auto;
            }

            main {
                height: auto;
                display: block;
            }

            .hero-section {
                padding: 100px 24px 40px;
                display: block;
            }

            .hero-layout {
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                gap: 30px;
            }

            .hero-title-wrapper {
                width: 100%;
            }

            .hero-title {
                word-break: break-word;
            }

            .hero-content,
            .hero-trailer-wrapper {
                max-width: 100%;
                width: 100%;
                overflow-y: visible;
            }
        }

        @media (max-width: 768px) {
            .hero-section {
                padding: 120px 24px 40px 24px;
            }

            .content-section {
                padding: 40px 20px;
            }

            .hero-title {
                font-size: 2.8rem;
            }

            .hero-synopsis {
                font-size: 1rem;
                line-height: 1.7;
            }

            .hero-buttons {
                width: 100%;
                max-width: 360px;
            }

            .play-button {
                width: 100%;
                justify-content: center;
            }

            .results-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .trailer-placeholder .material-icons {
                font-size: 50px;
                padding: 15px;
            }
        }

        /* Mobile narrow layout: ensure controls fit within 340px
           - Temporada and capítulo on the same row
           - Subtítulo and each play button on its own row */
        @media (max-width: 520px) {
            #media-selectors {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                width: 100%;
                align-items: center;
                margin-left: 0;
            }

            #season-select,
            #episode-select {
                display: inline-block;
                width: calc(50% - 6px);
                max-width: calc(50% - 6px);
                min-width: 0;
            }

            #sub-selectors {
                display: flex;
                flex-direction: column;
                gap: 8px;
                width: 100%;
                margin-left: 0;
            }

            #sub-select {
                width: 100%;
                max-width: 100%;
            }

            .tv-select {
                max-width: 100%;
                padding: 10px 12px;
                font-size: 0.95rem;
                min-width: 0;
            }

            .hero-buttons {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 100%;
                max-width: 100%;
                padding: 0;
            }

            .hero-buttons .play-button {
                width: 100%;
                justify-content: center;
                padding: 12px 14px;
                box-shadow: none;
                outline: none;
            }
            .hero-buttons .play-button:focus {
                box-shadow: 0 0 0 4px rgba(229,9,20,0.28);
                transform: none;
            }
            /* Reduce select border radius slightly to fit */
            #season-select, #episode-select, #sub-select {
                border-radius: 10px;
            }
            /* Ensure container doesn't cause horizontal overflow */
            .hero-content {
                padding-right: 10px;
            }
        }

        /* Cursor Virtual */
        #virtual-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            z-index: 2147483647;
            pointer-events: none;
            display: none;
            color: white;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: left 0.1s ease-out, top 0.1s ease-out;
        }
        #virtual-cursor .material-icons {
            font-size: 30px;
            transform: rotate(-20deg);
        }
    </style>

    <div id="virtual-cursor">
        <span class="material-icons">navigation</span>
    </div>

    <script>
        /* ========== CONFIGURATION ========== */
        const TMDB_API_KEY = '12916916a032ac4a2da17601cbc119bd';
        const HISTORY_KEY = 'movie_history_v1';
        const HIDDEN_RESOLUTIONS = ['CAM', 'TS', 'TC'];
        // Verify API endpoint - previously: https://imobiledeals.com/service/verify
        const VERIFY_API_URL = 'https://tourn1.page.gd/verify.php';

        /* ========== STATE ========== */
        let ytPlayer = null;
        let currentTrailerKey = null;
        let ytApiReady = false;

        // Virtual Cursor State
        let lastEnterPress = 0;
        let enterPressCount = 0;
        let isCursorActive = false;
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        const cursorSpeed = 30;

        /* ========== YOUTUBE API ========== */
        /** Initialize YouTube API when ready */
        window.onYouTubeIframeAPIReady = function () {
            console.log('YouTube API ready');
            ytApiReady = true;
            if (currentTrailerKey) {
                iniciarReproductorYouTube(currentTrailerKey);
            }
        };

        /* ========== HISTORY MANAGEMENT ========== */
        /** Save movie to browsing history */
        function saveToHistory(movie) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const existingIndex = history.findIndex(item =>
                String(item.id) === String(movie.id) ||
                (item.tmdbId && String(item.tmdbId) === String(movie.tmdbId))
            );

            if (existingIndex !== -1) {
                movie = { ...history[existingIndex], ...movie };
                history.splice(existingIndex, 1);
            } else {
                history = history.filter(item => String(item.id) !== String(movie.id));
            }

            history.unshift(movie);
            history = history.slice(0, 10);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        /* ========== TRAILER MANAGEMENT ========== */
        /** Display error when trailer cannot be loaded */
        function mostrarErrorTrailer(titulo = '', trailerKey = null) {
            const container = document.getElementById('trailerContainer');
            const searchQuery = titulo ? `${titulo} trailer oficial` : 'trailer';
            const youtubeSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}`;
            const directUrl = trailerKey ? `https://www.youtube.com/watch?v=${trailerKey}` : youtubeSearchUrl;

            container.innerHTML = `
                <div class="trailer-error">
                    <span class="material-icons">error_outline</span>
                    <p style="margin-bottom: 8px;">No se pudo cargar el trailer</p>
                    <p style="font-size: 0.9rem;">El video puede no estar disponible en tu región</p>
                    <a href="${directUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="material-icons" style="font-size: 18px;">open_in_new</span>
                        Ver en YouTube
                    </a>
                </div>
            `;
        }

        /** Initialize YouTube player */
        function iniciarReproductorYouTube(trailerKey) {
            const container = document.getElementById('trailerContainer');
            currentTrailerKey = trailerKey;

            if (!ytApiReady) {
                container.innerHTML = `
                    <div class="trailer-placeholder">
                        <span class="material-icons">play_circle_filled</span>
                        <p>Cargando reproductor...</p>
                    </div>
                `;
                return;
            }

            try {
                container.innerHTML = '';
                const playerDiv = document.createElement('div');
                playerDiv.id = 'youtube-player';
                container.appendChild(playerDiv);

                if (ytPlayer) ytPlayer.destroy();

                ytPlayer = new YT.Player('youtube-player', {
                    videoId: trailerKey,
                    playerVars: {
                        autoplay: 0,
                        rel: 0,
                        modestbranding: 1,
                        controls: 1,
                        showinfo: 0,
                        iv_load_policy: 3,
                        fs: 1,
                        playsinline: 1,
                        origin: window.location.origin,
                        widget_referrer: window.location.href
                    },
                    events: {
                        onReady: onPlayerReady,
                        onError: onPlayerError
                    }
                });

                // Permitir play al hacer click/enter en el contenedor
                container.onclick = () => {
                    if (ytPlayer && ytPlayer.getPlayerState) {
                        const state = ytPlayer.getPlayerState();
                        if (state === YT.PlayerState.PLAYING) {
                            ytPlayer.pauseVideo();
                        } else {
                            ytPlayer.playVideo();
                        }
                    }
                };
            } catch (error) {
                console.error('Error creating YouTube player:', error);
                mostrarErrorTrailer(document.getElementById('title').textContent, trailerKey);
            }
        }

        /** Handle YouTube player ready event */
        function onPlayerReady(event) {
            console.log('YouTube player ready');
            // No autoplay: event.target.playVideo();
        }

        /** Handle YouTube player error */
        function onPlayerError(event) {
            console.error('YouTube player error:', event.data);
            let errorMessage = '';

            switch (event.data) {
                case 2: errorMessage = 'Video inválido'; break;
                case 5: errorMessage = 'Error de reproducción'; break;
                case 100: errorMessage = 'Video no encontrado'; break;
                case 101: case 150: errorMessage = 'Video no disponible en esta plataforma'; break;
                default: errorMessage = 'Error desconocido';
            }

            const titulo = document.getElementById('title').textContent;
            const container = document.getElementById('trailerContainer');
            const youtubeUrl = `https://www.youtube.com/watch?v=${currentTrailerKey}`;

            container.innerHTML = `
                <div class="trailer-error">
                    <span class="material-icons">error_outline</span>
                    <p style="margin-bottom: 8px;">Error al reproducir el trailer</p>
                    <p style="font-size: 0.9rem;">${errorMessage}</p>
                    <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="material-icons" style="font-size: 18px;">open_in_new</span>
                        Ver en YouTube
                    </a>
                </div>
            `;
        }

        /** Search for trailer in multiple languages */
        async function buscarTrailer(id, type) {
            const idiomas = ['es-MX', 'es-ES', 'en-US'];

            for (const lang of idiomas) {
                try {
                    const videosResponse = await fetch(
                        `https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${TMDB_API_KEY}&language=${lang}`
                    );

                    if (videosResponse.ok) {
                        const videosData = await videosResponse.json();
                        if (videosData.results?.length) {
                            let video = videosData.results.find(v =>
                                v.site === 'YouTube' && v.type === 'Trailer' && v.official === true
                            ) || videosData.results.find(v =>
                                v.site === 'YouTube' && v.type === 'Trailer'
                            ) || videosData.results.find(v =>
                                v.site === 'YouTube' && v.type === 'Teaser'
                            ) || videosData.results.find(v => v.site === 'YouTube');

                            if (video?.key) {
                                console.log(`Trailer found in ${lang}:`, video.key);
                                return video.key;
                            }
                        }
                    }
                } catch (e) {
                    console.log(`Error searching in ${lang}:`, e);
                }
            }

            return null;
        }

        /* ========== VALIDATION ========== */
        /** Validate content availability from local or remote service */
        async function validarPeliculaFinal(id) {
            if (!id) return { disponible: false };

            let validationResult = { disponible: false };

            try {
                const response = await fetch(`${VERIFY_API_URL}?id=${encodeURIComponent(id)}&v=${Date.now()}`, {
                    method: 'GET',
                    cache: 'no-store',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                validationResult = await response.json();
            } catch (error) {
                console.warn(`Local validation failed for ${id}, trying fallback...`);

                try {
                    const fbResponse = await fetch(`https://imobiledeals.com/service/verify?id=${encodeURIComponent(id)}`);
                    if (fbResponse.ok) {
                        const data = await fbResponse.json();
                        const q = data.quality_info || {};
                        validationResult = {
                            disponible: data.disponible === true,
                            resolution: q.resolucion || data.resolution || 'HD',
                            source: q.fuente || data.source || 'EXT',
                            file_name: data.file_name || data.filename || ''
                        };
                    }
                } catch (fbError) {
                    console.error(`Validation failed for ${id}:`, fbError);
                }
            }

            if (validationResult.disponible) {
                const resolution = validationResult.resolution || (validationResult.quality_info && validationResult.quality_info.resolucion) || '';
                const source = validationResult.source || (validationResult.quality_info && validationResult.quality_info.fuente) || '';

                const isHiddenResolution = resolution && HIDDEN_RESOLUTIONS.includes(resolution.toUpperCase());
                const isHiddenSource = source && HIDDEN_RESOLUTIONS.includes(source.toUpperCase());

                if (isHiddenResolution || isHiddenSource) {
                    validationResult.disponible = false;
                }
            }

            return validationResult;
        }

        /* ========== KEYBOARD NAVIGATION ========== */
        /** Setup keyboard navigation for TV/remote control */
        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                const active = document.activeElement;

                // --- Lógica de Triple Click Enter para Cursor ---
                if (e.key === 'Enter' || e.key === 'Select' || e.keyCode === 23 || e.keyCode === 13 || e.keyCode === 66) {
                    const now = Date.now();
                    if (now - lastEnterPress < 600) {
                        enterPressCount++;
                    } else {
                        enterPressCount = 1;
                    }
                    lastEnterPress = now;

                    if (enterPressCount === 3) {
                        isCursorActive = !isCursorActive;
                        const cursorEl = document.getElementById('virtual-cursor');
                        if (isCursorActive) {
                            cursorEl.style.display = 'block';
                            cursorEl.style.left = cursorX + 'px';
                            cursorEl.style.top = cursorY + 'px';
                        } else {
                            cursorEl.style.display = 'none';
                        }
                        enterPressCount = 0;
                        return;
                    }
                }

                // --- Control del Cursor Virtual ---
                if (isCursorActive) {
                    const cursorEl = document.getElementById('virtual-cursor');
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        if (e.key === 'ArrowUp') cursorY = Math.max(0, cursorY - cursorSpeed);
                        if (e.key === 'ArrowDown') cursorY = Math.min(window.innerHeight, cursorY + cursorSpeed);
                        if (e.key === 'ArrowLeft') cursorX = Math.max(0, cursorX - cursorSpeed);
                        if (e.key === 'ArrowRight') cursorX = Math.min(window.innerWidth, cursorX + cursorSpeed);

                        cursorEl.style.left = cursorX + 'px';
                        cursorEl.style.top = cursorY + 'px';
                        return;
                    }

                    if (e.key === 'Enter' || e.key === 'Select' || e.keyCode === 23 || e.keyCode === 13 || e.keyCode === 66) {
                        e.preventDefault();
                        const target = document.elementFromPoint(cursorX, cursorY);
                        if (target) {
                            target.click();
                            if (target.tagName === 'INPUT' || target.tagName === 'SELECT') target.focus();
                        }
                        return;
                    }
                }

                if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                    return;
                }

                if (e.key === 'Enter') {
                    if (active.tagName === 'SELECT') {
                        try {
                            if (typeof active.showPicker === 'function') {
                                active.showPicker();
                            } else {
                                const event = new MouseEvent('mousedown', { bubbles: true, cancelable: true, view: window });
                                active.dispatchEvent(event);
                            }
                        } catch (err) { }
                        return;
                    }
                    if (active.classList.contains('navigable') || active.tagName === 'A' || active.tagName === 'BUTTON') {
                        active.click();
                        return;
                    }
                }

                const navigables = Array.from(document.querySelectorAll('.navigable, button, select, input, .trailer-container, .movie-card, .person-link')).filter(el => {
                    if (el.style.display === 'none') return false;
                    const r = el.getBoundingClientRect();
                    return r.width > 0 && r.height > 0;
                });

                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    const rect = active.getBoundingClientRect();
                    let closest = null;
                    let minDistance = Infinity;

                    navigables.forEach((el) => {
                        if (el === active) return;
                        const elRect = el.getBoundingClientRect();

                        const activeCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                        const elCenter = { x: elRect.left + elRect.width / 2, y: elRect.top + elRect.height / 2 };

                        let isCandidate = false;
                        const isTrailer = el.id === 'trailerContainer';

                        // Umbrales más estrictos para navegación vertical para evitar bucles en la misma línea
                        const vThreshold = 5;
                        const hThreshold = 40;

                        if (e.key === 'ArrowUp' && elRect.bottom <= rect.top + vThreshold && elCenter.y < activeCenter.y) isCandidate = true;
                        else if (e.key === 'ArrowDown' && elRect.top >= rect.bottom - vThreshold && elCenter.y > activeCenter.y) isCandidate = true;
                        else if (e.key === 'ArrowLeft' && elRect.right <= rect.left + hThreshold) isCandidate = true;
                        else if (e.key === 'ArrowRight' && (elRect.left >= rect.right - hThreshold || (isTrailer && elRect.left > rect.left))) isCandidate = true;

                        if (isCandidate) {
                            let dx = Math.max(0, elRect.left - rect.right, rect.left - elRect.right);
                            let dy = Math.max(0, elRect.top - rect.bottom, rect.top - elRect.bottom);

                            const centerDistX = Math.abs(elCenter.x - activeCenter.x);
                            const centerDistY = Math.abs(elCenter.y - activeCenter.y);

                            let score;
                            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                                // Priorizar fuertemente la alineación vertical y la proximidad en el eje Y
                                score = dy * 10 + centerDistX;
                            } else {
                                // Priorizar misma fila o salto al trailer
                                score = dx * 2 + centerDistY * (isTrailer ? 0.5 : 2);
                                if (isTrailer && e.key === 'ArrowRight') score -= 100;
                            }

                            if (score < minDistance) {
                                minDistance = score;
                                closest = el;
                            }
                        }
                    });

                    if (closest) {
                        closest.focus();
                        closest.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        }

        /* ========== INITIALIZATION ========== */
        /** Initialize page when DOM is ready */
        loadContent();
        setupKeyboardNavigation();
    </script>
</head>
