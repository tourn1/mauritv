<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#141414" />

    <title>MauriTV</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --bg: #141414;
            --bg-secondary: #1b1b1b;
            --card: rgba(255, 255, 255, 0.06);
            --text: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #e50914;
            --accent-hover: #ff1f29;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
        }

        main {
            width: 100%;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 100;
            transition: 0.25s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .hero-section {
            position: relative;
            width: 100%;
            min-height: 65vh;
            display: flex;
            align-items: flex-end;
            padding: 80px 80px 30px;
            background-color: #000;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, #141414 5%, rgba(20, 20, 20, 0.35) 40%, rgba(20, 20, 20, 0.2) 100%),
                linear-gradient(to right, rgba(20, 20, 20, 0.96) 15%, rgba(20, 20, 20, 0.7) 40%, transparent 70%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 720px;
            animation: fadeUp 0.8s ease;
        }

        .hero-title {
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 900;
            line-height: 0.95;
            margin-bottom: 1.5rem;
            text-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.8rem;
        }

        .hero-meta span {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .hero-synopsis {
            font-size: 1.08rem;
            line-height: 1.9;
            color: #e8e8e8;
            margin-bottom: 1rem;
            max-width: 650px;
        }

        .hero-cast-director {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 650px;
        }

        .hero-cast-director strong {
            color: var(--text);
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 1rem;
        }

        .play-button {
            border: none;
            border-radius: 8px;
            padding: 14px 26px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            background: var(--accent);
            color: white;
        }

        .play-button:hover,
        .play-button.selected,
        .play-button:focus {
            background: var(--accent-hover);
            transform: scale(1.04);
            box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.25);
        }

        .tv-select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.25s;
        }

        .tv-select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            z-index: 10;
        }

        .tv-select:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .tv-select option {
            background: #1b1b1b;
            color: white;
        }

        .content-section {
            padding: 30px 80px 80px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .trailer-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 24px;
            background: #0a0a0a;
            box-shadow: var(--shadow);
            margin-top: 0;
            outline: none;
            aspect-ratio: 16 / 9;
        }

        .trailer-container:focus {
            box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.35);
        }

        #youtube-player {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .trailer-placeholder {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            cursor: pointer;
            transition: 0.3s;
            gap: 20px;
        }

        .trailer-placeholder:hover {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        }

        .trailer-placeholder .material-icons {
            font-size: 80px;
            color: #e50914;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            padding: 20px;
        }

        .trailer-placeholder p {
            color: #888;
            font-size: 14px;
        }

        .trailer-error {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            background: #0a0a0a;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .trailer-error .material-icons {
            font-size: 48px;
            margin-bottom: 16px;
            color: #e50914;
        }

        .trailer-error a {
            color: #e50914;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 20px;
            background: rgba(229, 9, 20, 0.2);
            border-radius: 8px;
            transition: 0.25s;
        }

        .trailer-error a:hover {
            background: rgba(229, 9, 20, 0.4);
        }

        .carousel {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            margin-top: 40px;
            padding-bottom: 10px;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        .carousel img {
            width: 260px;
            height: 150px;
            object-fit: cover;
            border-radius: 14px;
            flex-shrink: 0;
            transition: 0.3s;
            cursor: pointer;
        }

        .carousel img:hover {
            transform: scale(1.07);
        }

        .carousel img:focus {
            outline: 4px solid rgba(229, 9, 20, 0.8);
            outline-offset: 4px;
            transform: scale(1.08);
        }

        /* Movie Card Grid (from style.css) */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            padding: 1rem 0;
        }

        .movie-card {
            background: #181818;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
            outline: none;
            aspect-ratio: 2/3;
        }

        .movie-card:focus {
            border-color: #ffffff;
            transform: scale(1.1);
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .movie-card:hover {
            transform: scale(1.08);
            z-index: 90;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #252525;
        }

        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            transform: translateY(0);
            transition: transform 0.3s;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ffffff;
            background: rgba(229, 9, 20, 0.17);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: inline-block;
            max-width: 100%;
        }

        .movie-card:focus .movie-title {
            color: white !important;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .movie-year {
            font-size: 0.9rem;
            color: #e5e5e5;
        }

        .movie-rating {
            font-size: 0.9rem;
            color: #f5c518;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 12;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            text-transform: uppercase;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero-section {
                padding: 120px 24px 40px 24px;
                min-height: 90vh;
            }

            .content-section {
                padding: 40px 20px;
            }

            .hero-title {
                font-size: 2.8rem;
            }

            .hero-synopsis {
                font-size: 1rem;
                line-height: 1.7;
            }

            .hero-buttons {
                width: 100%;
            }

            .play-button {
                width: 100%;
                justify-content: center;
            }

            .carousel img {
                width: 200px;
                height: 120px;
            }

            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .section-title {
                font-size: 1.5rem;
            }

            .trailer-placeholder .material-icons {
                font-size: 50px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <main>
        <button class="back-button" id="backBtn" onclick="history.back()" aria-label="Volver">
            <span class="material-icons">arrow_back</span>
        </button>

        <section class="hero-section" id="hero" style="background-color:#000;">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title" id="title">Cargando...</h1>
                <div class="hero-meta" id="meta"></div>
                <p class="hero-synopsis" id="overview"></p>
                <div class="hero-cast-director" id="castDirector"></div>
                <div id="media-selectors"
                    style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px;">
                    <select id="season-select" class="tv-select" tabindex="0" aria-label="Seleccionar temporada"
                        style="display: none;"></select>
                    <select id="episode-select" class="tv-select" tabindex="0" aria-label="Seleccionar capítulo"
                        style="display: none;"></select>
                    <select id="lang-select" class="tv-select" tabindex="0" aria-label="Seleccionar idioma">
                        <option value="es" selected>Español</option>
                        <option value="en">Inglés</option>
                    </select>
                </div>
                <div class="hero-buttons">
                    <button class="play-button" id="playBtn">
                        <span class="material-icons">play_arrow</span>
                        Reproducir
                    </button>
                </div>
            </div>
        </section>

        <section class="content-section">
            <h2 class="section-title">Trailer Oficial</h2>
            <div class="trailer-container" id="trailerContainer" tabindex="0" aria-label="Contenedor de trailer"></div>
            <h2 class="section-title" style="margin-top: 40px;" id="similarTitle">Relacionados</h2>
            <div class="results-grid" id="carousel"></div>
        </section>
    </main>

    <script>
        const TMDB_API_KEY = '12916916a032ac4a2da17601cbc119bd';
        const HISTORY_KEY = 'movie_history_v1';
        let ytPlayer = null;
        let currentTrailerKey = null;
        let ytApiReady = false;

        // Esperar a que la API de YouTube esté lista
        window.onYouTubeIframeAPIReady = function () {
            console.log('YouTube API ready');
            ytApiReady = true;
            if (currentTrailerKey) {
                iniciarReproductorYouTube(currentTrailerKey);
            }
        };

        function saveToHistory(movie) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const existingIndex = history.findIndex(item => String(item.id) === String(movie.id) || (item.tmdbId && String(item.tmdbId) === String(movie.tmdbId)));

            if (existingIndex !== -1) {
                movie = { ...history[existingIndex], ...movie };
                history.splice(existingIndex, 1);
            } else {
                history = history.filter(item => String(item.id) !== String(movie.id));
            }

            history.unshift(movie);
            history = history.slice(0, 10);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function mostrarErrorTrailer(titulo = '', trailerKey = null) {
            const container = document.getElementById('trailerContainer');
            const searchQuery = titulo ? `${titulo} trailer oficial` : 'trailer';
            const youtubeSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}`;
            const directUrl = trailerKey ? `https://www.youtube.com/watch?v=${trailerKey}` : youtubeSearchUrl;

            container.innerHTML = `
                <div class="trailer-error">
                    <span class="material-icons">error_outline</span>
                    <p style="margin-bottom: 8px;">No se pudo cargar el trailer</p>
                    <p style="font-size: 0.9rem;">El video puede no estar disponible en tu región</p>
                    <a href="${directUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="material-icons" style="font-size: 18px;">open_in_new</span>
                        Ver en YouTube
                    </a>
                </div>
            `;
        }

        function iniciarReproductorYouTube(trailerKey) {
            const container = document.getElementById('trailerContainer');
            currentTrailerKey = trailerKey;

            if (!ytApiReady) {
                // Mostrar placeholder mientras carga la API
                container.innerHTML = `
                    <div class="trailer-placeholder">
                        <span class="material-icons">play_circle_filled</span>
                        <p>Cargando reproductor...</p>
                    </div>
                `;
                return;
            }

            try {
                // Limpiar contenedor
                container.innerHTML = '';

                // Crear div para el reproductor
                const playerDiv = document.createElement('div');
                playerDiv.id = 'youtube-player';
                container.appendChild(playerDiv);

                // Crear reproductor de YouTube
                if (ytPlayer) {
                    ytPlayer.destroy();
                }

                ytPlayer = new YT.Player('youtube-player', {
                    videoId: trailerKey,
                    playerVars: {
                        autoplay: 1,
                        rel: 0,
                        modestbranding: 1,
                        controls: 1,
                        showinfo: 0,
                        iv_load_policy: 3,
                        fs: 1,
                        playsinline: 1,
                        origin: window.location.origin,
                        widget_referrer: window.location.href
                    },
                    events: {
                        onReady: onPlayerReady,
                        onError: onPlayerError
                    }
                });

            } catch (error) {
                console.error('Error creando reproductor YouTube:', error);
                mostrarErrorTrailer(document.getElementById('title').textContent, trailerKey);
            }
        }

        function onPlayerReady(event) {
            console.log('Reproductor YouTube listo');
            event.target.playVideo();
        }

        function onPlayerError(event) {
            console.error('Error en reproductor YouTube:', event.data);
            let errorMessage = '';

            // Códigos de error de YouTube
            switch (event.data) {
                case 2:
                    errorMessage = 'Video inválido';
                    break;
                case 5:
                    errorMessage = 'Error de reproducción';
                    break;
                case 100:
                    errorMessage = 'Video no encontrado';
                    break;
                case 101:
                case 150:
                    errorMessage = 'Video no disponible en esta plataforma';
                    break;
                default:
                    errorMessage = 'Error desconocido';
            }

            const titulo = document.getElementById('title').textContent;
            const container = document.getElementById('trailerContainer');
            const youtubeUrl = `https://www.youtube.com/watch?v=${currentTrailerKey}`;

            container.innerHTML = `
                <div class="trailer-error">
                    <span class="material-icons">error_outline</span>
                    <p style="margin-bottom: 8px;">Error al reproducir el trailer</p>
                    <p style="font-size: 0.9rem;">${errorMessage}</p>
                    <a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="material-icons" style="font-size: 18px;">open_in_new</span>
                        Ver en YouTube
                    </a>
                </div>
            `;
        }

        async function buscarTrailer(id, type) {
            // Lista de idiomas a probar
            const idiomas = ['es-MX', 'es-ES', 'en-US'];

            for (const lang of idiomas) {
                try {
                    const videosResponse = await fetch(
                        `https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${TMDB_API_KEY}&language=${lang}`
                    );

                    if (videosResponse.ok) {
                        const videosData = await videosResponse.json();
                        if (videosData.results?.length) {
                            // Prioridad: Trailer oficial > Trailer > Teaser > Cualquier video
                            let video = videosData.results.find(v =>
                                v.site === 'YouTube' && v.type === 'Trailer' && v.official === true
                            );

                            if (!video) {
                                video = videosData.results.find(v =>
                                    v.site === 'YouTube' && v.type === 'Trailer'
                                );
                            }

                            if (!video) {
                                video = videosData.results.find(v =>
                                    v.site === 'YouTube' && v.type === 'Teaser'
                                );
                            }

                            if (!video && videosData.results.length > 0) {
                                video = videosData.results.find(v => v.site === 'YouTube');
                            }

                            if (video && video.key) {
                                console.log(`Trailer encontrado en ${lang}:`, video.key);
                                return video.key;
                            }
                        }
                    }
                } catch (e) {
                    console.log(`Error buscando en ${lang}:`, e);
                }
            }

            return null;
        }

        async function loadContent() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || '278';
            const type = params.get('type') || 'movie';

            try {
                const response = await fetch(
                    `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=es-MX&append_to_response=recommendations,external_ids,credits`
                );

                if (!response.ok) {
                    throw new Error(`TMDB responded with ${response.status}`);
                }

                const data = await response.json();

                const title = data.title || data.name || 'Sin título';
                document.title = `${title} - MauriTV`;
                document.getElementById('title').textContent = title;
                document.getElementById('overview').textContent = data.overview || 'Sinopsis no disponible.';

                // Extraer Director y Elenco
                let director = 'N/A';
                if (data.credits && data.credits.crew) {
                    const dirObj = data.credits.crew.find(c => c.job === 'Director');
                    if (dirObj) {
                        director = dirObj.name;
                    } else if (data.created_by && data.created_by.length > 0) {
                        director = data.created_by.map(c => c.name).join(', ');
                    }
                }

                let cast = 'N/A';
                if (data.credits && data.credits.cast && data.credits.cast.length > 0) {
                    cast = data.credits.cast.slice(0, 5).map(c => c.name).join(', ');
                }

                document.getElementById('castDirector').innerHTML = `
                    <p style="margin-bottom: 4px;"><strong>Director:</strong> ${director}</p>
                    <p><strong>Elenco:</strong> ${cast}</p>
                `;

                const year = data.release_date?.substring(0, 4) || data.first_air_date?.substring(0, 4) || 'N/A';
                const rating = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
                const seasonsLabel = type === 'tv' && data.number_of_seasons
                    ? `<span>${data.number_of_seasons} temporada${data.number_of_seasons === 1 ? '' : 's'}</span>`
                    : `<span>${data.runtime || 'HD'} min</span>`;

                document.getElementById('meta').innerHTML = `
                    <span>${year}</span>
                    <span>⭐ ${rating}</span>
                    ${seasonsLabel}
                    <span>${type === 'movie' ? 'Película' : 'Serie'}</span>
                `;

                const imdbId = data.external_ids?.imdb_id;

                // Guardar en historial
                const movieObj = {
                    id: imdbId || id,
                    tmdbId: id,
                    l: title,
                    y: year,
                    rating: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                    qid: type === 'movie' ? 'movie' : 'tvSeries',
                    i: data.poster_path ? { imageUrl: `https://image.tmdb.org/t/p/w500${data.poster_path}` } : null
                };
                saveToHistory(movieObj);

                if (data.backdrop_path) {
                    document.getElementById('hero').style.backgroundImage = `url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                }

                // Buscar trailer
                const trailerKey = await buscarTrailer(id, type);

                if (trailerKey) {
                    // Mostrar placeholder mientras carga
                    const container = document.getElementById('trailerContainer');
                    container.innerHTML = `
                        <div class="trailer-placeholder">
                            <span class="material-icons">play_circle_filled</span>
                            <p>Cargando trailer...</p>
                        </div>
                    `;

                    // Iniciar reproductor
                    iniciarReproductorYouTube(trailerKey);
                } else {
                    console.log('No se encontró trailer para:', title);
                    mostrarErrorTrailer(title);
                }

                // Cargar contenido recomendado (recomendaciones)
                const similarTitle = document.getElementById('similarTitle');
                similarTitle.textContent = type === 'movie' ? 'Películas Recomendadas' : 'Series Recomendadas';

                const carousel = document.getElementById('carousel');
                const similares = data.recommendations?.results?.slice(0, 5) || [];

                if (similares.length > 0) {
                    carousel.innerHTML = similares.map((item, index) => {
                        const itemTitle = item.title || item.name || 'Sin título';
                        const imageUrl = item.poster_path
                            ? `https://image.tmdb.org/t/p/w500${item.poster_path}`
                            : 'https://via.placeholder.com/500x750?text=No+Image';
                        const year = item.release_date ? item.release_date.substring(0, 4) : (item.first_air_date ? item.first_air_date.substring(0, 4) : '');
                        const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
                        const typeDisplay = type === 'movie' ? 'PELÍCULA' : 'SERIE';

                        return `
                        <div class="movie-card navigable" tabindex="0" onclick="window.location.href='content.html?id=${item.id}&type=${type}'" onkeydown="if(event.key==='Enter') this.click()" aria-label="${itemTitle}">
                            <div class="type-badge">${typeDisplay}</div>
                            <img src="${imageUrl}" class="movie-poster" alt="${itemTitle}" loading="lazy">
                            <div class="movie-info">
                                <h3 class="movie-title">${itemTitle}</h3>
                                <div class="movie-meta">
                                    <span class="movie-year">${year}</span>
                                    <span class="movie-rating">★ ${rating}</span>
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    carousel.innerHTML = '<div style="color:#888; text-align:center; padding:40px; grid-column: 1 / -1;">No hay contenido relacionado disponible</div>';
                }

                carousel.setAttribute('aria-label', type === 'movie' ? 'Películas relacionadas' : 'Series relacionadas');

                // Configurar selectores de serie
                const seasonSelect = document.getElementById('season-select');
                const episodeSelect = document.getElementById('episode-select');

                if (type === 'tv' && data.seasons) {
                    document.getElementById('season-select').style.display = 'inline-block';
                    document.getElementById('episode-select').style.display = 'inline-block';

                    const validSeasons = data.seasons.filter(s => s.season_number > 0);

                    if (validSeasons.length > 0) {
                        seasonSelect.innerHTML = validSeasons.map(s => `<option value="${s.season_number}" data-episodes="${s.episode_count}">Temporada ${s.season_number}</option>`).join('');

                        const updateEpisodes = () => {
                            const selectedOption = seasonSelect.options[seasonSelect.selectedIndex];
                            const episodeCount = parseInt(selectedOption.getAttribute('data-episodes')) || 1;

                            let episodesHtml = '';
                            for (let i = 1; i <= episodeCount; i++) {
                                episodesHtml += `<option value="${i}">Capítulo ${i}</option>`;
                            }
                            episodeSelect.innerHTML = episodesHtml;
                        };

                        seasonSelect.addEventListener('change', updateEpisodes);
                        updateEpisodes();
                    }
                }

                // Configurar botón de reproducción
                const playBtn = document.getElementById('playBtn');
                playBtn.onclick = () => {
                    const lang = document.getElementById('lang-select').value;
                    let url = `player.html?id=${id}&type=${type}${imdbId ? `&imdb=${imdbId}` : ''}&lang=${lang}`;
                    if (type === 'tv') {
                        const s = seasonSelect.value;
                        const e = episodeSelect.value;
                        if (s && e) {
                            url += `&s=${s}&e=${e}`;
                        }
                    }
                    window.location.href = url;
                };
                playBtn.classList.add('selected');
                playBtn.focus();

            } catch (err) {
                console.error('Error cargando contenido:', err);
                document.getElementById('title').textContent = 'Error cargando contenido';
                mostrarErrorTrailer();
            }
        }

        function setupKeyboardNavigation() {
            const backBtn = document.getElementById('backBtn');
            const playBtn = document.getElementById('playBtn');
            const trailerContainer = document.getElementById('trailerContainer');
            const carousel = document.getElementById('carousel');
            const seasonSelect = document.getElementById('season-select');
            const episodeSelect = document.getElementById('episode-select');
            const langSelect = document.getElementById('lang-select');

            if (!backBtn || !playBtn || !trailerContainer || !carousel) return;

            document.addEventListener('keydown', (e) => {
                const active = document.activeElement;
                const cards = Array.from(carousel.querySelectorAll('.movie-card'));
                const activeIndex = cards.indexOf(active);
                const isTv = seasonSelect && seasonSelect.style.display !== 'none';

                if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                    return;
                }

                if (e.key === 'Enter' && active.tagName === 'SELECT') {
                    try {
                        if (typeof active.showPicker === 'function') {
                            active.showPicker();
                        } else {
                            const event = new MouseEvent('mousedown', { bubbles: true, cancelable: true, view: window });
                            active.dispatchEvent(event);
                        }
                    } catch (err) {}
                    return;
                }

                if (active === backBtn) {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (isTv) seasonSelect.focus();
                        else langSelect.focus();
                    }
                    return;
                }

                if (active === seasonSelect) {
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        episodeSelect.focus();
                    }
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        playBtn.focus();
                    }
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        backBtn.focus();
                    }
                    return;
                }

                if (active === episodeSelect) {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        seasonSelect.focus();
                    }
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        langSelect.focus();
                    }
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        playBtn.focus();
                    }
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        backBtn.focus();
                    }
                    return;
                }

                if (active === langSelect) {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        if (isTv) episodeSelect.focus();
                    }
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        playBtn.focus();
                    }
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        backBtn.focus();
                    }
                    return;
                }

                if (active === playBtn) {
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (isTv) seasonSelect.focus();
                        else langSelect.focus();
                    }
                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        trailerContainer.focus();
                    }
                    return;
                }

                if (active === trailerContainer || trailerContainer.contains(active)) {
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        playBtn.focus();
                    }
                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        if (cards.length) {
                            cards[0].focus();
                        }
                    }
                    return;
                }

                if (activeIndex >= 0) {
                    if (e.key === 'ArrowLeft' && activeIndex > 0) {
                        e.preventDefault();
                        cards[activeIndex - 1].focus();
                    }
                    if (e.key === 'ArrowRight' && activeIndex < cards.length - 1) {
                        e.preventDefault();
                        cards[activeIndex + 1].focus();
                    }
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        trailerContainer.focus();
                    }
                    // Opcional: Navegar hacia abajo si el grid tiene múltiples filas
                    if (e.key === 'ArrowDown' && activeIndex + 5 < cards.length) {
                        e.preventDefault();
                        cards[activeIndex + 5].focus();
                    }
                    return;
                }
            });
        }

        // Inicializar
        loadContent();
        setupKeyboardNavigation();
    </script>
</body>

</html>
